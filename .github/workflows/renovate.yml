name: Renovate

on:
  schedule:
    - cron: "0 18 * * *"  # 03:00 Asia/Tokyo
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry run: log what would happen, open no PRs"
        type: boolean
        default: false
      logLevel:
        description: "Log level"
        type: choice
        options:
          - info
          - debug
        default: info

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    environment: renovate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Renovate
        uses: renovatebot/github-action@v46.1.19
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/renovate-global.js
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || 'null' }}
